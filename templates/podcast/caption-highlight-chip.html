<!DOCTYPE html>
<!--
  TEMPLATE PREVIEW · Caption highlight — BOXED ("D" style)
  WHERE IT'S USED: punchy subtitle for trailer / teaser moments. Words build in
  one-by-one and the key word(s) land in a yellow box. Sits high so it clears the
  speaker's head.
  This file is a LOOPING PREVIEW only (placeholder backdrop, no real footage).
  RENDER-READY SOURCE: projects/podcast/compositions/caption-highlight.html
  (swap the words via projects/podcast/batch/caption-highlight.json)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Template · Caption highlight (boxed)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Lilita+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --kraft:#ECE2CF; --paper:#F3ECDB; --ink:#232A3A; --ink2:#6F6A5C; --cream:#F6EDD6;
    --green:#3F8A5A; --greenD:#2C6B43; --blue:#2F5AA8; --blueD:#21407A;
    --yellow:#E6B53C; --yellowD:#C08F1C; --coral:#DF8A64; --coralD:#B5664A;
    --scale:0.46;
  }
  *{box-sizing:border-box;}
  body{ margin:0; padding:32px; background:#15171e; color:#e8e6df;
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:16px; }
  .tpl-title{ font-size:22px; font-weight:800; margin:0; }
  .tpl-note{ max-width:calc(1920px * var(--scale)); font-size:14px; line-height:1.55;
    opacity:.85; margin:0; text-align:center; }
  .tpl-note b{ color:var(--yellow); }
  .tpl-note code{ background:#23262f; padding:2px 6px; border-radius:5px; font-size:12px; }

  /* ---- preview screen (1920x1080 scaled down) ---- */
  .screen{ width:calc(1920px * var(--scale)); height:calc(1080px * var(--scale));
    position:relative; overflow:hidden; border-radius:12px; border:1px solid #2c2f3a;
    box-shadow:0 10px 40px rgba(0,0,0,.5); }
  .stage{ width:1920px; height:1080px; position:absolute; top:0; left:0;
    transform:scale(var(--scale)); transform-origin:top left; }
  /* neutral placeholder backdrop — NO real footage / no person photo */
  .backdrop{ position:absolute; inset:0; background:linear-gradient(135deg,#454d60,#2d3340 60%,#262b36); }
  .backdrop::after{ content:'PLACEHOLDER FRAME \00B7 your footage goes here';
    position:absolute; top:26px; left:50%; transform:translateX(-50%);
    font-family:'Space Mono',monospace; font-size:22px; letter-spacing:.18em;
    text-transform:uppercase; color:rgba(255,255,255,.26); }
  .head{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:520px; height:640px; opacity:.5; }
  .head .skull{ position:absolute; left:50%; top:0; transform:translateX(-50%); width:300px; height:340px; border-radius:48% 48% 44% 44%; background:#1b1f28; }
  .head .torso{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:520px; height:370px; border-radius:240px 240px 0 0; background:#1b1f28; }

  /* ---- the caption itself (matches the render composition) ---- */
  .cap{ position:absolute; left:140px; right:140px; top:56px;
    font-family:'Hanken Grotesk',sans-serif; font-weight:800;
    font-size:62px; line-height:1.5; color:var(--cream);
    text-align:center; letter-spacing:-0.01em;
    text-shadow:0 3px 14px rgba(0,0,0,0.85), 0 1px 2px rgba(0,0,0,0.9); }
  .cap .word{ display:inline-block; opacity:0; transform:translateY(20px);
    animation: wordInLoop 6s ease-in-out infinite; }
  .hl-chip{ color:var(--ink); background:var(--yellow);
    border-radius:10px; padding:0.05em 0.24em 0.15em; margin:0 0.22em;
    box-shadow:3px 4px 0 var(--yellowD); -webkit-text-stroke:0; text-shadow:none; }
  .cap .word.pop{ transform:scale(0.5); animation: chipInLoop 6s ease-in-out infinite; }

  @keyframes wordInLoop{
    0%{opacity:0; transform:translateY(20px);}
    7%{opacity:1; transform:translateY(0);}
    82%{opacity:1; transform:translateY(0);}
    92%,100%{opacity:0; transform:translateY(8px);}
  }
  @keyframes chipInLoop{
    0%{opacity:0; transform:scale(.5);}
    5%{opacity:1; transform:scale(1.12);}
    8%{transform:scale(1);}
    82%{opacity:1; transform:scale(1);}
    92%,100%{opacity:0; transform:scale(1);}
  }
</style>
</head>
<body>
  <h1 class="tpl-title">Caption highlight — boxed ("D" style)</h1>
  <p class="tpl-note"><b>Where it's used:</b> punchy subtitle for trailer/teaser moments. Words build in one-by-one;
     the key word(s) land in a yellow box. Sits high to clear the speaker.
     Render from <code>compositions/caption-highlight.html</code>.</p>

  <div class="screen">
    <div class="stage">
      <div class="backdrop"></div>
      <div class="head"><div class="skull"></div><div class="torso"></div></div>
      <div id="cap" class="cap"></div>
    </div>
  </div>

  <script>
    // Same builder logic as the render composition, but looping for preview.
    const segments = [
      { t: "This is a complete playbook for both" },
      { t: "founders", hl: true },
      { t: "and" },
      { t: "CXOs.", hl: true }
    ];
    const cap = document.getElementById('cap');
    const tokens = [];
    segments.forEach(seg => {
      if (seg.br) tokens.push({ br:true });
      else if (seg.hl) tokens.push({ t:seg.t, hl:true });
      else String(seg.t).split(' ').forEach(w => { if (w) tokens.push({ t:w, hl:false }); });
    });
    const animCount = tokens.filter(t => !t.br).length;
    const per = 0.9 / Math.max(1, animCount);
    let ai = 0;
    tokens.forEach(tok => {
      if (tok.br) { cap.appendChild(document.createElement('br')); return; }
      const span = document.createElement('span');
      span.className = 'word' + (tok.hl ? ' pop hl-chip' : '');
      span.style.animationDelay = (per * ai).toFixed(3) + 's';
      span.textContent = tok.t;
      cap.appendChild(span);
      cap.appendChild(document.createTextNode(' '));
      ai++;
    });
  </script>
</body>
</html>

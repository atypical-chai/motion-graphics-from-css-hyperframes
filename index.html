<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter Break B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --kraft:#ECE2CF; --paper:#F3ECDB; --cream:#F6EDD6; --ink:#232A3A;
    --green:#3F8A5A; --blue:#2F5AA8; --yellow:#E6B53C; --coral:#DF8A64;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; background:transparent;}

  .ch-b-strip{
    position:absolute; bottom:0; left:0; background:var(--cream);
    border-top:5px solid var(--ink); border-right:5px solid var(--ink);
    border-radius:0 22px 0 0; padding:22px 49px; z-index:10;
    animation: chBLoop 4s ease-in-out infinite;
  }
  .ch-b-strip span{
    font-family:'Space Mono',monospace; color:var(--ink); letter-spacing:0.04em;
    white-space:nowrap; font-size:31px;
  }
  @keyframes chBLoop{
    0%{transform:translateX(-110%);}
    10%{transform:translateX(0);}
    70%{transform:translateX(0);}
    80%,100%{transform:translateX(-110%);}
  }
</style>
</head>
<body>
  <div data-hf-id="hf-okm3" id="root" data-composition-id="chapter-break-test" data-start="0" data-duration="4" data-width="1920" data-height="1080">
    <div data-hf-id="hf-o7jx" class="ch-b-strip clip" data-start="0" data-duration="4" data-track-index="0">
      <span data-hf-id="hf-84l4">03 · PAYING THE VENDOR</span>
    </div>
  </div>
</body>
</html>
